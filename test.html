    <video id="episode" class="episode-video" controls width="auto" height="auto" style="margin: 64px;"></video>

    <script>
        const videos = [
            "EP03-T1.mp4",
            "EP03-T2.mp4",
            "EP03-T3.mp4",
            "EP03-T4.mp4",
            "EP03-T5.mp4"
        ];

        let current = 0;
        const episode = document.getElementById("episode");

        // erstes Video laden
        episode.src = videos[current];

        // wenn Video endet → nächstes starten
        episode.addEventListener("ended", () => {
            current++;

            if (current < videos.length) {
                episode.src = videos[current];
                episode.play();
            } else {
                console.log("Alle Videos fertig!");
            }
        });
    </script>

</body>
